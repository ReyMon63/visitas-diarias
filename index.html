/* ── FORMATTERS ──────────────────────────────────────────── */
function isNullish(v) { return v === null || v === undefined || v === '' || (typeof v === 'number' && isNaN(v)); }

// Moneda: detecta si viene en millones (< 1000 aprox) o en pesos directos (>= 1000)
function fmtPeso(v) {
  if (isNullish(v)) return null;
  const n = Number(v);
  if (isNaN(n)) return null;
  const abs = Math.abs(n);
  if (abs >= 1_000_000) {
    return '$' + (n/1_000_000).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}) + 'M';
  }
  if (abs >= 1_000) {
    return '$' + (n/1_000).toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}) + 'K';
  }
  return '$' + n.toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});
}

// Entero con separador de miles
function fmtInt(v) {
  if (isNullish(v)) return null;
  const n = Number(v);
  if (isNaN(n)) return null;
  return Math.round(n).toLocaleString('es-MX');
}

// Porcentaje: si viene entre -1.5 y 1.5 asume decimal (0.85 → 85%), si no lo toma directo
function fmtPct(v) {
  if (isNullish(v)) return null;
  const n = Number(v);
  if (isNaN(n)) return null;
  const pct = Math.abs(n) <= 1.5 ? n * 100 : n;
  return pct.toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
}

// vs AA con signo + / -
function fmtVsAA(v) {
  if (isNullish(v)) return null;
  const n = Number(v);
  if (isNaN(n)) return null;
  const pct = Math.abs(n) <= 1.5 ? n * 100 : n;
  return (pct >= 0 ? '+' : '') + pct.toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
}

function vsAAClass(v) {
  if (isNullish(v)) return '';
  const n = Number(v);
  if (isNaN(n)) return '';
  return n >= 0 ? 'pos' : 'neg';
}

/* ── GE DAILY RATE ───────────────────────────────────────── */
function calcGeRate(ge, planGE) {
  if (isNullish(planGE) || Number(planGE) <= 0) return null;
  const remaining = Math.max(0, Number(planGE) - Number(ge || 0));
  if (remaining === 0) return { done: true };

  const today = new Date();
  const y = today.getFullYear(), m = today.getMonth();
  const lastDay = new Date(y, m + 1, 0).getDate();
  let weekdays = 0, weekendDays = 0;
  for (let d = today.getDate(); d <= lastDay; d++) {
    const dow = new Date(y, m, d).getDay();
    (dow === 0 || dow === 6) ? weekendDays++ : weekdays++;
  }
  const totalDays = weekdays + weekendDays;
  if (totalDays === 0) return { done: false, x: remaining, y: remaining };

  // X = mínimo a vender cada día entre semana (al menos 1 si hay pendiente)
  const x = weekdays > 0 ? Math.max(1, Math.floor(remaining / totalDays)) : 0;
  // Y = lo que queda después de cubrir semana con X, repartido en días de finde
  const remainingWeekend = Math.max(0, remaining - x * weekdays);
  const y = weekendDays > 0 ? Math.max(x, Math.ceil(remainingWeekend / weekendDays)) : x;
  return { done: false, x, y };
}

    if (!realName) { console.warn('Pestaña no encontrada:', sheetKey, '— disponibles:', wb.SheetNames); continue; }

    const ws   = wb.Sheets[realName];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: null, raw: true });
    if (!rows.length) { console.warn('Pestaña vacía:', realName); continue; }

    // Volcar columnas detectadas para debug
    const rawCols = Object.keys(rows[0]);
    console.log(`[${realName}] columnas raw: ` + rawCols.join(' | '));

    // Mapear columna normalizada → nombre real
    const colMap = {};
    for (const k of rawCols) colMap[normCol(k)] = k;
    console.log(`[${realName}] columnas normalizadas: ` + Object.keys(colMap).join(' | '));

    const col = (...aliases) => aliases.map(a => colMap[normCol(a)]).find(v => v !== undefined);

    const cDET   = col('DET','DTTE');
    const cVENTA = col('VENTA','VENTAS','VENTA MES','VENTA ($)','Venta 2026');
    const cELEG  = col('ELEGIBLES','ELEGIBLE','ELEG','Elegibles');
    const cPLAN  = col('PLAN GE','PLAN_GE','PLANGE','PLAN','Plan GE','Plan G.E.');
    const cGE    = col('GE','Garantía Extendida','Garantia Extendida','Garantías 2026','Garantias 2026');
    const cCONV  = col('CONV%','CONV %','CONV','CONVERSION','CONVERSIÓN','CONV.','% Conv','% CONV','Conversión','%Conv');
    const cVSAA  = col('VS AA','VS AA%','VS_AA','VSAA','VS. AA','VS.AA','VS AA %','vs AA','Cr. vs AA');

    console.log(`[${realName}] mapeo → DET:${cDET} VENTA:${cVENTA} ELEG:${cELEG} PLAN:${cPLAN} GE:${cGE} CONV:${cCONV} VSAA:${cVSAA}`);

    for (const row of rows) {
      const det = row[cDET];
      if (isNullish(det)) continue;
      const key = String(det).trim();
      if (!key || key === 'DET') continue; // saltar fila de encabezado si sheet_to_json la incluye
      kpiMap[key] = {
        venta:     row[cVENTA]  ?? null,
        vsAA:      row[cVSAA]   ?? null,
        ge:        row[cGE]     ?? null,
        planGE:    row[cPLAN]   ?? null,
        elegibles: row[cELEG]   ?? null,
        conv:      row[cCONV]   ?? null,
      };
    }
  }
  console.log('KPI map — total registros:', Object.keys(kpiMap).length, '| muestra:', Object.entries(kpiMap).slice(0,2));
  return kpiMap;
}

/* ── RENDER CARDS ────────────────────────────────────────── */
function dash() { return '<span class="kpi-dash">—</span>'; }

function renderCards(stores, kpiMap, dataOk) {
  const summaryBar = document.getElementById('summary-bar');
  const totalCount = document.getElementById('total-count');
  const content    = document.getElementById('main-content');

  if (!stores || !stores.length) {
    summaryBar.style.display = 'none';
    content.innerHTML = `
      <div class="status-box">
        <div class="icon">📅</div>
        <h2>Sin visitas programadas hoy</h2>
        <p>No hay tiendas asignadas para esta fecha.<br>Consulta el archivo de rutas.</p>
      </div>`;
    return;
  }

  summaryBar.style.display = 'flex';
  totalCount.textContent   = stores.length;

  const cards = stores.map((s, i) => {
    const cls    = getFormatClass(s.Formato);
    const icon   = getFormatIcon(s.Formato);
    const segCls = getSegClass(s.Segmentacion);
    const kpi    = kpiMap[String(s.DET).trim()] || {};

    const ventaStr = fmtPeso(kpi.venta);
    const vsAAStr  = fmtVsAA(kpi.vsAA);
    const vsAACls  = vsAAClass(kpi.vsAA);
    const geStr    = fmtInt(kpi.ge);
    const planStr  = fmtInt(kpi.planGE);
    const elegStr  = fmtInt(kpi.elegibles);
    const convStr  = fmtPct(kpi.conv);

    // KPI 1: Venta / vs AA
    const kpi1 = `<div class="kpi">
      <div class="kpi-label">Venta / vs AA</div>
      <div class="kpi-main">${ventaStr ?? dash()}</div>
      <div class="kpi-sub ${vsAACls}">${vsAAStr ?? dash()}</div>
    </div>`;

    // KPI 2: GE / Plan GE  (ambos en línea principal como "GE / Plan")
    const geVal   = geStr   ?? dash();
    const planVal = planStr ?? dash();
    const kpi2 = `<div class="kpi">
      <div class="kpi-label">GE / Plan GE</div>
      <div class="kpi-main">${geVal}</div>
      <div class="kpi-sub">${planVal}</div>
    </div>`;

    // KPI 3: Elegibles / Conv%
    const kpi3 = `<div class="kpi">
      <div class="kpi-label">Elegibles / Conv%</div>
      <div class="kpi-main">${elegStr ?? dash()}</div>
      <div class="kpi-sub">${convStr ?? dash()}</div>
    </div>`;

    const rate = calcGeRate(kpi.ge, kpi.planGE);
    const rateHtml = !rate ? ''
      : rate.done ? `<span class="ge-rate done">✓</span>`
      : `<span class="ge-rate">${rate.x}<span class="ge-sep">|</span>${rate.y}</span>`;

    return `<div class="card ${cls}">
      <div class="card-top">
        <div class="order-num">${i+1}</div>
        <div class="card-info">
          <div class="store-name-row">
            <div class="store-name">${icon} ${s.Club.trim()}</div>
            ${rateHtml}
          </div>
          <div class="meta">
            <span class="tag tag-format">${s.Formato}</span>
            <span class="tag tag-det">DET ${s.DET}</span>
            <span class="tag tag-seg ${segCls}">${s.Segmentacion}</span>
          </div>
          <div class="territorial">👤 ${s.Territorial}</div>
        </div>
      </div>
      <div class="kpis">${kpi1}${kpi2}${kpi3}</div>
    </div>`;
  }).join('');

  const noteClass = dataOk ? '' : 'err';
  const noteText  = dataOk
    ? '📊 Datos de ventas cargados desde Google Drive'
    : '⚠️ No se cargaron datos de ventas. Necesitas conexión a internet para cargar el archivo desde Google Drive.';

  content.innerHTML = `<div class="cards">${cards}</div>
    <p class="data-note ${noteClass}">${noteText}</p>`;
}

/* ── MAIN ────────────────────────────────────────────────── */
async function fetchXlsx() {
  for (const url of XLSX_URLS) {
    try {
      console.log('Intentando URL:', url);
      const resp = await fetch(url + '&t=' + Date.now(), { cache: 'no-store' });
      if (!resp.ok) { console.warn(`URL falló (${resp.status}):`, url); continue; }
      const buf = await resp.arrayBuffer();
      if (buf.byteLength < 1000) { console.warn('Respuesta demasiado pequeña, probando siguiente URL'); continue; }
      console.log('Descarga OK — bytes:', buf.byteLength, '— URL:', url);
      return buf;
    } catch (e) {
      console.warn('Error en URL:', url, e.message);
    }
  }
  throw new Error('Ninguna URL funcionó');
}

async function init() {
  const key = getTodayKey();
  document.getElementById('date-badge').textContent = formatDateNice(key);
  const stores = VISITAS[key] || [];

  try {
    const buf    = await fetchXlsx();
    const wb     = XLSX.read(buf, { type: 'array', cellDates: false });
    const kpiMap = parseSheets(wb);
    renderCards(stores, kpiMap, true);
  } catch (err) {
    console.error('Error cargando xlsx:', err);
    renderCards(stores, {}, false);
  }
}

init();

function forceRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  btn.disabled = true;
  // Recargar limpiando caché del HTML
  window.location.href = window.location.href.split('?')[0] + '?t=' + Date.now();
}
</script>
