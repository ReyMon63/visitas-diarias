<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitas del Día</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 0 0 48px; }

  .header {
    background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%);
    padding: 28px 24px 22px; text-align: center;
    box-shadow: 0 4px 20px rgba(0,120,212,0.4);
  }
  .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .header .subtitle { font-size: 0.85rem; opacity: 0.85; }
  .date-badge {
    display: inline-block;
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35);
    border-radius: 20px; padding: 6px 18px; margin-top: 14px;
    font-size: 1rem; font-weight: 600;
  }

  .summary {
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 12px 24px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem;
  }
  .summary .count { background: #0078d4; border-radius: 12px; padding: 3px 12px; font-weight: 700; font-size: 1rem; }
  .summary .label { opacity: 0.75; }

  .cards { padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; max-width: 700px; margin: 0 auto; }

  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .card:hover { border-color: #0078d4; }

  .card-top { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px 12px; border-left: 4px solid; }
  .supercenter .card-top { border-color: #0078d4; }
  .bodega      .card-top { border-color: #f0883e; }
  .sams        .card-top { border-color: #3fb950; }

  .order-num { min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
  .supercenter .order-num { background: rgba(0,120,212,0.2); color: #58a6ff; border: 1.5px solid #0078d4; }
  .bodega      .order-num { background: rgba(240,136,62,0.2); color: #f0883e; border: 1.5px solid #f0883e; }
  .sams        .order-num { background: rgba(63,185,80,0.2);  color: #3fb950; border: 1.5px solid #3fb950; }

  .card-info { flex: 1; min-width: 0; }
  .store-name { font-size: 1.05rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
  .meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.78rem; }
  .tag { border-radius: 6px; padding: 2px 9px; font-weight: 500; white-space: nowrap; }
  .tag-format { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
  .tag-det    { background: #21262d; color: #8b949e; border: 1px solid #30363d; font-family: monospace; }
  .tag-seg    { border: 1px solid; }
  .seg-bottom-low  { background: rgba(88,166,255,0.1);  color: #58a6ff; border-color: rgba(88,166,255,0.3); }
  .seg-bottom-high { background: rgba(240,136,62,0.1);  color: #f0883e; border-color: rgba(240,136,62,0.3); }
  .seg-cero        { background: rgba(248,81,73,0.12);  color: #f85149; border-color: rgba(248,81,73,0.3); }
  .seg-medium      { background: rgba(63,185,80,0.1);   color: #3fb950; border-color: rgba(63,185,80,0.3); }
  .seg-top         { background: rgba(210,153,34,0.12); color: #d29922; border-color: rgba(210,153,34,0.3); }
  .seg-other       { background: #21262d; color: #8b949e; border-color: #30363d; }
  .territorial { font-size: 0.78rem; color: #6e7681; margin-top: 4px; }

  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #21262d; }
  .kpi { padding: 10px 8px; border-right: 1px solid #21262d; text-align: center; }
  .kpi:last-child { border-right: none; }
  .kpi-label { font-size: 0.63rem; color: #6e7681; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; white-space: nowrap; }
  .kpi-main  { font-size: 0.95rem; font-weight: 700; color: #e6edf3; white-space: nowrap; }
  .kpi-sub   { font-size: 0.75rem; color: #8b949e; margin-top: 3px; white-space: nowrap; font-weight: 500; }
  .kpi-sub.pos { color: #3fb950; }
  .kpi-sub.neg { color: #f85149; }
  .dash { color: #484f58; }

  .status-box { text-align: center; padding: 50px 24px; color: #8b949e; max-width: 700px; margin: 0 auto; }
  .status-box .icon { font-size: 3rem; margin-bottom: 14px; }
  .status-box h2 { font-size: 1.1rem; margin-bottom: 8px; color: #c9d1d9; }
  .status-box p  { font-size: 0.88rem; line-height: 1.6; }

  .spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #0078d4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .load-steps { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .step { font-size: 0.82rem; display: flex; align-items: center; gap: 8px; }
  .step-icon { width: 18px; text-align: center; }
  .step.done   .step-icon::before { content: '✅'; }
  .step.active .step-icon::before { content: '⏳'; }
  .step.wait   .step-icon::before { content: '⬜'; }
  .step.err    .step-icon::before { content: '❌'; }

  .data-note { text-align: center; font-size: 0.72rem; color: #484f58; padding: 10px 16px 0; max-width: 700px; margin: 0 auto; }
  .data-note.err { color: #f85149; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 Visitas del Día</h1>
  <div class="subtitle">Ramón Rivas · Monterrey</div>
  <div class="date-badge" id="date-badge">—</div>
</div>

<div class="summary" id="summary-bar" style="display:none;">
  <span class="count" id="total-count">0</span>
  <span class="label">tiendas programadas hoy</span>
</div>

<div id="main-content">
  <div class="status-box">
    <div class="spinner"></div>
    <h2>Cargando datos...</h2>
    <div class="load-steps">
      <div class="step active" id="step-rutas"><span class="step-icon"></span>Descargando rutas del mes</div>
      <div class="step wait"   id="step-kpis" ><span class="step-icon"></span>Descargando datos de ventas</div>
      <div class="step wait"   id="step-render"><span class="step-icon"></span>Construyendo vista del día</div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════
   CONFIG — solo cambia los IDs si mueves los archivos
   ════════════════════════════════════════════════════ */
const ID_RUTAS = '1bevJZBCYV8VEufpVaUU0fBRW-xgEBh_h'; // Resumen_Visitas.xlsx
const ID_KPIS  = '1WWTdmMMRq_mPXl6-xd32ZF5P3-GVFrrY'; // KPIs (BA / WM / SMC)

const URL_RUTAS = `https://docs.google.com/spreadsheets/d/${ID_RUTAS}/export?format=xlsx`;
const URL_KPIS  = `https://docs.google.com/spreadsheets/d/${ID_KPIS}/export?format=xlsx`;

// Columnas de visita en el archivo de rutas (soporta hasta Visita 5)
const VISIT_COLS = ['Visita 1','Visita 2','Visita 3','Visita 4','Visita 5'];

// Pestañas del archivo de KPIs → Formato
const SHEET_TO_FORMAT = { BA: 'Bodega Aurrera', WM: 'Supercenter', SMC: "Sam´s" };

const DIAS_ES  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

/* ════════════ HELPERS ════════════ */
function getTodayKey() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function formatDateNice(k) {
  const [y,m,d] = k.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${DIAS_ES[dt.getDay()]}, ${d} de ${MESES_ES[m-1]} ${y}`;
}
function getFormatClass(f) {
  f = (f||'').toLowerCase();
  if (f.includes('super')) return 'supercenter';
  if (f.includes('bodega')) return 'bodega';
  return 'sams';
}
function getFormatIcon(f) {
  f = (f||'').toLowerCase();
  if (f.includes('super')) return '🛒';
  if (f.includes('bodega')) return '🏪';
  return '🏢';
}
function getSegClass(s) {
  s = (s||'').toLowerCase();
  if (s.includes('bottom low'))  return 'seg-bottom-low';
  if (s.includes('bottom high')) return 'seg-bottom-high';
  if (s.includes('cero'))        return 'seg-cero';
  if (s.includes('medium'))      return 'seg-medium';
  if (s.includes('top'))         return 'seg-top';
  return 'seg-other';
}
function isNullish(v) { return v === null || v === undefined || v === '' || (typeof v === 'number' && isNaN(v)); }
function normCol(s) {
  return String(s||'').trim().toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ');
}

/* ════════════ FORMATTERS ════════════ */
function fmtPeso(v) {
  if (isNullish(v)) return null;
  const n = Number(v); if (isNaN(n)) return null;
  const a = Math.abs(n);
  if (a >= 1_000_000) return '$' + (n/1_000_000).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}) + 'M';
  if (a >= 1_000)     return '$' + (n/1_000).toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}) + 'K';
  return '$' + n.toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtInt(v) {
  if (isNullish(v)) return null;
  const n = Number(v); if (isNaN(n)) return null;
  return Math.round(n).toLocaleString('es-MX');
}
function fmtPct(v) {
  if (isNullish(v)) return null;
  const n = Number(v); if (isNaN(n)) return null;
  const p = Math.abs(n) <= 1.5 ? n*100 : n;
  return p.toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
}
function fmtVsAA(v) {
  if (isNullish(v)) return null;
  const n = Number(v); if (isNaN(n)) return null;
  const p = Math.abs(n) <= 1.5 ? n*100 : n;
  return (p >= 0 ? '+' : '') + p.toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
}
function vsAAClass(v) {
  if (isNullish(v)) return '';
  const n = Number(v); if (isNaN(n)) return '';
  return n >= 0 ? 'pos' : 'neg';
}

/* ════════════ PARSE RUTAS ════════════
   Lee "Mes Completo" (o primera hoja) y devuelve:
   { "YYYY-MM-DD": [ {Formato, Territorial, DET, Nombre, Segmentacion}, ... ] }
*/
function parseRutas(wb) {
  const visitas = {};
  // Buscar hoja — "Mes Completo" primero, si no la primera
  const sheetName = wb.SheetNames.find(n => n.trim().toLowerCase().includes('completo'))
                 || wb.SheetNames[0];
  console.log('[Rutas] hoja usada:', sheetName);

  const ws   = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: null, raw: false });
  if (!rows.length) return visitas;

  const rawCols = Object.keys(rows[0]);
  console.log('[Rutas] columnas:', rawCols);

  const colMap = {};
  for (const k of rawCols) colMap[normCol(k)] = k;

  const col = (...aliases) => aliases.map(a => colMap[normCol(a)]).find(v => v !== undefined);

  const cFmt  = col('Formato','FORMATO');
  const cTerr = col('Territorial','TERRITORIAL');
  const cDET  = col('DET');
  const cNom  = col('Nombre','NOMBRE','Club','CLUB');
  const cSeg  = col('Segmentación actual','Segmentacion actual','SEGMENTACION','Segmentación','Segmentacion');

  // Columnas de visita que existen en este archivo
  const visitCols = VISIT_COLS.map(vc => col(vc)).filter(Boolean);
  console.log('[Rutas] cols de visita encontradas:', visitCols);

  for (const row of rows) {
    const det = row[cDET];
    if (isNullish(det)) continue;

    const entry = {
      Formato:      String(row[cFmt]  || '').trim(),
      Territorial:  String(row[cTerr] || '').trim(),
      DET:          String(det).trim(),
      Nombre:       String(row[cNom]  || '').trim(),
      Segmentacion: String(row[cSeg]  || '').trim(),
    };

    for (const vc of visitCols) {
      const rawDate = row[vc];
      if (isNullish(rawDate)) continue;

      // SheetJS con raw:false devuelve fechas como string "M/D/YYYY", "DD/MM/YYYY" o "YYYY-MM-DD"
      // También puede venir como "4.may", "4/5/2026", etc.
      const dateKey = parseDate(rawDate);
      if (!dateKey) continue;

      if (!visitas[dateKey]) visitas[dateKey] = [];
      visitas[dateKey].push(entry);
    }
  }
  console.log('[Rutas] fechas encontradas:', Object.keys(visitas).sort());
  return visitas;
}

/* Convierte cualquier representación de fecha a "YYYY-MM-DD" */
function parseDate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();

  // Ya viene como YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // Formato "DD/MM/YYYY" o "M/D/YYYY"
  const slash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (slash) {
    const [,a,b,y] = slash;
    // Heurístico: si primero > 12 es DD/MM, si no asumimos MM/DD (Excel US)
    const [dd,mm] = Number(a) > 12 ? [a,b] : [b,a];
    return `${y}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
  }

  // Formato "4.may", "4.mayo" (como en la imagen)
  const dot = s.match(/^(\d{1,2})\.([\wé]+)\.?$/i);
  if (dot) {
    const day = dot[1].padStart(2,'0');
    const monStr = dot[2].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const monIdx = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']
                    .findIndex(m => monStr.startsWith(m));
    if (monIdx >= 0) {
      const year = new Date().getFullYear();
      return `${year}-${String(monIdx+1).padStart(2,'0')}-${day}`;
    }
  }

  // Número serial de Excel (ej. 46xxx)
  const num = Number(s);
  if (!isNaN(num) && num > 40000 && num < 60000) {
    const d = XLSX.SSF.parse_date_code(num);
    if (d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }

  return null;
}

/* ════════════ PARSE KPIs ════════════ */
function parseKpis(wb) {
  const kpiMap = {};
  console.log('[KPIs] pestañas:', wb.SheetNames);

  for (const [sheetKey] of Object.entries(SHEET_TO_FORMAT)) {
    const realName = wb.SheetNames.find(n => n.trim().toUpperCase() === sheetKey.toUpperCase())
                  || wb.SheetNames.find(n => n.trim().toUpperCase().includes(sheetKey));
    if (!realName) { console.warn('[KPIs] pestaña no encontrada:', sheetKey); continue; }

    const ws   = wb.Sheets[realName];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: null, raw: true });
    if (!rows.length) continue;

    const colMap = {};
    for (const k of Object.keys(rows[0])) colMap[normCol(k)] = k;
    const col = (...aliases) => aliases.map(a => colMap[normCol(a)]).find(v => v !== undefined);

    const cDET  = col('DET');
    const cVENTA= col('VENTA','VENTAS','VENTA MES');
    const cELEG = col('ELEGIBLES','ELEGIBLE','ELEG');
    const cPLAN = col('PLAN GE','PLAN_GE','PLANGE','PLAN');
    const cGE   = col('GE');
    const cCONV = col('CONV%','CONV %','CONV','CONVERSION','CONVERSIÓN');
    const cVSAA = col('VS AA','VS AA%','VS_AA','VSAA','VS. AA','VS.AA','VS AA %');

    console.log(`[KPIs][${realName}] DET:${cDET} VENTA:${cVENTA} GE:${cGE} PLAN:${cPLAN} ELEG:${cELEG} CONV:${cCONV} VSAA:${cVSAA}`);

    for (const row of rows) {
      const det = row[cDET];
      if (isNullish(det)) continue;
      const key = String(det).trim();
      if (!key || key.toUpperCase() === 'DET') continue;
      kpiMap[key] = {
        venta:     row[cVENTA] ?? null,
        vsAA:      row[cVSAA]  ?? null,
        ge:        row[cGE]    ?? null,
        planGE:    row[cPLAN]  ?? null,
        elegibles: row[cELEG]  ?? null,
        conv:      row[cCONV]  ?? null,
      };
    }
  }
  console.log('[KPIs] total registros:', Object.keys(kpiMap).length);
  return kpiMap;
}

/* ════════════ FETCH ════════════ */
async function fetchXlsx(url, label) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`${label}: HTTP ${resp.status}`);
  const buf = await resp.arrayBuffer();
  if (buf.byteLength < 500) throw new Error(`${label}: respuesta vacía`);
  console.log(`[Fetch] ${label} OK — ${buf.byteLength} bytes`);
  return buf;
}

/* ════════════ STEP UI ════════════ */
function step(id, state) {
  const el = document.getElementById(id);
  if (el) el.className = `step ${state}`;
}

/* ════════════ RENDER ════════════ */
function dash() { return '<span class="dash">—</span>'; }

function renderCards(stores, kpiMap, rutasOk, kpisOk) {
  const summaryBar = document.getElementById('summary-bar');
  const content    = document.getElementById('main-content');

  if (!stores || !stores.length) {
    summaryBar.style.display = 'none';
    content.innerHTML = `
      <div class="status-box">
        <div class="icon">📅</div>
        <h2>Sin visitas programadas hoy</h2>
        <p>No hay tiendas asignadas para esta fecha en el archivo de rutas.</p>
      </div>`;
    return;
  }

  summaryBar.style.display = 'flex';
  document.getElementById('total-count').textContent = stores.length;

  const cards = stores.map((s, i) => {
    const cls    = getFormatClass(s.Formato);
    const icon   = getFormatIcon(s.Formato);
    const segCls = getSegClass(s.Segmentacion);
    const kpi    = kpiMap[s.DET] || {};

    const ventaStr = fmtPeso(kpi.venta);
    const vsAAStr  = fmtVsAA(kpi.vsAA);
    const vsAACls  = vsAAClass(kpi.vsAA);
    const geStr    = fmtInt(kpi.ge);
    const planStr  = fmtInt(kpi.planGE);
    const elegStr  = fmtInt(kpi.elegibles);
    const convStr  = fmtPct(kpi.conv);

    return `<div class="card ${cls}">
      <div class="card-top">
        <div class="order-num">${i+1}</div>
        <div class="card-info">
          <div class="store-name">${icon} ${s.Nombre || s.DET}</div>
          <div class="meta">
            <span class="tag tag-format">${s.Formato}</span>
            <span class="tag tag-det">DET ${s.DET}</span>
            <span class="tag tag-seg ${segCls}">${s.Segmentacion}</span>
          </div>
          <div class="territorial">👤 ${s.Territorial}</div>
        </div>
      </div>
      <div class="kpis">
        <div class="kpi">
          <div class="kpi-label">Venta / vs AA</div>
          <div class="kpi-main">${ventaStr ?? dash()}</div>
          <div class="kpi-sub ${vsAACls}">${vsAAStr ?? dash()}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">GE / Plan GE</div>
          <div class="kpi-main">${geStr ?? dash()}</div>
          <div class="kpi-sub">${planStr ?? dash()}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Elegibles / Conv%</div>
          <div class="kpi-main">${elegStr ?? dash()}</div>
          <div class="kpi-sub">${convStr ?? dash()}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const notes = [];
  if (!rutasOk) notes.push('⚠️ Rutas: no se pudo descargar el archivo');
  if (!kpisOk)  notes.push('⚠️ Ventas: no se pudo descargar el archivo');
  const noteHtml = notes.length
    ? `<p class="data-note err">${notes.join(' · ')}</p>`
    : `<p class="data-note">📊 Datos actualizados al cargar · Fuente: Google Drive</p>`;

  content.innerHTML = `<div class="cards">${cards}</div>${noteHtml}`;
}

/* ════════════ MAIN ════════════ */
async function init() {
  const key = getTodayKey();
  document.getElementById('date-badge').textContent = formatDateNice(key);

  let visitas = {}, kpiMap = {}, rutasOk = false, kpisOk = false;

  // ── 1. Rutas
  step('step-rutas', 'active');
  try {
    const buf = await fetchXlsx(URL_RUTAS, 'Rutas');
    const wb  = XLSX.read(buf, { type: 'array', raw: false, cellDates: false });
    visitas   = parseRutas(wb);
    rutasOk   = true;
    step('step-rutas', 'done');
  } catch(e) {
    console.error('[Rutas] error:', e);
    step('step-rutas', 'err');
  }

  // ── 2. KPIs
  step('step-kpis', 'active');
  try {
    const buf = await fetchXlsx(URL_KPIS, 'KPIs');
    const wb  = XLSX.read(buf, { type: 'array', cellDates: false });
    kpiMap    = parseKpis(wb);
    kpisOk    = true;
    step('step-kpis', 'done');
  } catch(e) {
    console.error('[KPIs] error:', e);
    step('step-kpis', 'err');
  }

  // ── 3. Render
  step('step-render', 'active');
  const stores = visitas[key] || [];
  renderCards(stores, kpiMap, rutasOk, kpisOk);
  step('step-render', 'done');
}

init();
</script>
