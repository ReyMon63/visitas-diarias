<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 0 0 40px;
  }

  .header {
    background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%);
    padding: 28px 24px 22px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,120,212,0.4);
  }
  .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .header .subtitle { font-size: 0.85rem; opacity: 0.85; }
  .date-badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 20px;
    padding: 6px 18px;
    margin-top: 14px;
    font-size: 1rem;
    font-weight: 600;
  }

  .summary {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
  }
  .summary .count {
    background: #0078d4;
    border-radius: 12px;
    padding: 3px 12px;
    font-weight: 700;
    font-size: 1rem;
  }
  .summary .label { opacity: 0.75; }

  .cards {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 700px;
    margin: 0 auto;
  }

  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #0078d4; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px 12px;
    border-left: 4px solid;
  }
  .supercenter .card-top { border-color: #0078d4; }
  .bodega      .card-top { border-color: #f0883e; }
  .sams        .card-top { border-color: #3fb950; }

    min-width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
  }
  .supercenter .order-num { background: rgba(0,120,212,0.2); color: #58a6ff; border: 1.5px solid #0078d4; }

    margin-bottom: 5px;

  .tag { border-radius: 6px; padding: 2px 9px; font-weight: 500; white-space: nowrap; }
  .tag-format { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
  .tag-det    { background: #21262d; color: #8b949e; border: 1px solid #30363d; font-family: monospace; }
  .tag-seg    { border: 1px solid; }
  .seg-bottom-low  { background: rgba(88,166,255,0.1);  color: #58a6ff; border-color: rgba(88,166,255,0.3); }
  .seg-bottom-high { background: rgba(240,136,62,0.1);  color: #f0883e; border-color: rgba(240,136,62,0.3); }

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid #21262d;

  .kpi {

    padding: 8px 16px 0;

    margin: 0 auto;

/* ── HELPERS ─────────────────────────────────────────────── */
function getTodayKey() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function formatDateNice(k) {
  const [y,m,d] = k.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${DIAS_ES[dt.getDay()]}, ${d} de ${MESES_ES[m-1]} ${y}`;
}
function getFormatClass(f) {
  f = (f||'').toLowerCase();
  if (f.includes('super')) return 'supercenter';
  if (f.includes('bodega')) return 'bodega';
  return 'sams';
}
function getFormatIcon(f) {
  f = (f||'').toLowerCase();
  if (f.includes('super')) return '🛒';
  if (f.includes('bodega')) return '🏪';
  return '🏢';
}
function getSegClass(s) {
  s = (s||'').toLowerCase();
  if (s.includes('bottom low'))  return 'seg-bottom-low';
  if (s.includes('bottom high')) return 'seg-bottom-high';
  if (s.includes('cero'))        return 'seg-cero';
  if (s.includes('medium'))      return 'seg-medium';
  if (s.includes('top'))         return 'seg-top';
  return 'seg-other';
}

/* ── FORMATTERS ──────────────────────────────────────────── */
function isNullish(v) { return v === null || v === undefined || v === '' || (typeof v === 'number' && isNaN(v)); }

// Moneda: detecta si viene en millones (< 1000 aprox) o en pesos directos (>= 1000)
function fmtPeso(v) {
  if (isNullish(v)) return null;
  const n = Number(v);
  if (isNaN(n)) return null;
  const abs = Math.abs(n);
  if (abs >= 1_000_000) {
    return '$' + (n/1_000_000).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}) + 'M';
  }
  if (abs >= 1_000) {
    return '$' + (n/1_000).toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}) + 'K';
  }
  return '$' + n.toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});
}

// Entero con separador de miles
function fmtInt(v) {
  if (isNullish(v)) return null;
  const n = Number(v);
  if (isNaN(n)) return null;
  return Math.round(n).toLocaleString('es-MX');
}

// Porcentaje: si viene entre -1.5 y 1.5 asume decimal (0.85 → 85%), si no lo toma directo
function fmtPct(v) {
  if (isNullish(v)) return null;
  const n = Number(v);
  if (isNaN(n)) return null;
  const pct = Math.abs(n) <= 1.5 ? n * 100 : n;
  return pct.toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
}

// vs AA con signo + / -
function fmtVsAA(v) {
  if (isNullish(v)) return null;
  const n = Number(v);
  if (isNaN(n)) return null;
  const pct = Math.abs(n) <= 1.5 ? n * 100 : n;
  return (pct >= 0 ? '+' : '') + pct.toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
}

function vsAAClass(v) {
  if (isNullish(v)) return '';
  const n = Number(v);
  if (isNaN(n)) return '';
  return n >= 0 ? 'pos' : 'neg';
}

/* ── PARSE SHEETS ────────────────────────────────────────── */
function normCol(s) { return String(s||'').trim().toUpperCase().replace(/\s+/g,' '); }

function parseSheets(wb) {
  const kpiMap = {};
  for (const [sheetKey] of Object.entries(SHEET_TO_FORMAT)) {
    const ws = wb.Sheets[sheetKey];
    if (!ws) { console.warn('Pestaña no encontrada:', sheetKey); continue; }

    const rows = XLSX.utils.sheet_to_json(ws, { defval: null, raw: true });
    if (!rows.length) continue;

    // Mapear nombres de columna normalizados → nombre real
    const colMap = {};
    for (const k of Object.keys(rows[0])) colMap[normCol(k)] = k;

    // Resolver columnas con posibles variantes de nombre
    const col = (aliases) => aliases.map(a => colMap[normCol(a)]).find(Boolean);

    const cDET   = col(['DET']);
    const cVENTA = col(['VENTA','VENTAS']);
    const cELEG  = col(['ELEGIBLES','ELEG','ELEGIBLE']);
    const cPLAN  = col(['PLAN GE','PLAN_GE','PLANGE','PLAN']);
    const cGE    = col(['GE']);
    const cCONV  = col(['CONV%','CONV %','CONV','CONVERSION','CONVERSIÓN']);
    const cVSAA  = col(['VS AA','VS_AA','VSAA','VS AA%','VS. AA','VS.AA']);

    for (const row of rows) {
      const det = row[cDET];
      if (isNullish(det)) continue;
      const key = String(det).trim();
      if (!key) continue;
      kpiMap[key] = {
        venta:     row[cVENTA]  ?? null,
        vsAA:      row[cVSAA]   ?? null,
        ge:        row[cGE]     ?? null,
        planGE:    row[cPLAN]   ?? null,
        elegibles: row[cELEG]   ?? null,
        conv:      row[cCONV]   ?? null,
      };
    }
  }
  return kpiMap;
}

/* ── RENDER CARDS ────────────────────────────────────────── */
function dash() { return '<span class="kpi-dash">—</span>'; }

        <div class="icon">📅</div>
        <h2>Sin visitas programadas hoy</h2>
        <p>No hay tiendas asignadas para esta fecha.<br>Consulta el archivo de rutas.</p>
      </div>`;
    return;
  }

  summaryBar.style.display = 'flex';
  totalCount.textContent   = stores.length;

  const cards = stores.map((s, i) => {
    const cls    = getFormatClass(s.Formato);
    const icon   = getFormatIcon(s.Formato);
    const segCls = getSegClass(s.Segmentacion);
    const kpi    = kpiMap[String(s.DET).trim()] || {};

    const ventaStr = fmtPeso(kpi.venta);
    const vsAAStr  = fmtVsAA(kpi.vsAA);
    const vsAACls  = vsAAClass(kpi.vsAA);
    const geStr    = fmtInt(kpi.ge);
    const planStr  = fmtInt(kpi.planGE);
    const elegStr  = fmtInt(kpi.elegibles);
    const convStr  = fmtPct(kpi.conv);

    // KPI 1: Venta / vs AA
    const kpi1 = `<div class="kpi">
      <div class="kpi-label">Venta / vs AA</div>
      <div class="kpi-main">${ventaStr ?? dash()}</div>
      <div class="kpi-sub ${vsAACls}">${vsAAStr ?? dash()}</div>
    </div>`;

    // KPI 2: GE / Plan GE  (ambos en línea principal como "GE / Plan")
    const geVal   = geStr   ?? dash();
    const planVal = planStr ?? dash();
    const kpi2 = `<div class="kpi">
      <div class="kpi-label">GE / Plan GE</div>
      <div class="kpi-main">${geVal}</div>
      <div class="kpi-sub">${planVal}</div>
    </div>`;

    // KPI 3: Elegibles / Conv%
    const kpi3 = `<div class="kpi">
      <div class="kpi-label">Elegibles / Conv%</div>
      <div class="kpi-main">${elegStr ?? dash()}</div>
      <div class="kpi-sub">${convStr ?? dash()}</div>
    </div>`;

    return `<div class="card ${cls}">
      <div class="card-top">
        <div class="order-num">${i+1}</div>
        <div class="card-info">
          <div class="store-name">${icon} ${s.Club.trim()}</div>
          <div class="meta">
            <span class="tag tag-format">${s.Formato}</span>
            <span class="tag tag-det">DET ${s.DET}</span>
            <span class="tag tag-seg ${segCls}">${s.Segmentacion}</span>
          </div>
          <div class="territorial">👤 ${s.Territorial}</div>
        </div>
      </div>
      <div class="kpis">${kpi1}${kpi2}${kpi3}</div>
    </div>`;
  }).join('');

  const noteClass = dataOk ? '' : 'err';
  const noteText  = dataOk
    ? '📊 Datos de ventas cargados desde Google Drive'
    : '⚠️ No se cargaron datos de ventas — verifica que el archivo en Drive sea público (acceso "Cualquiera con el enlace")';

  content.innerHTML = `<div class="cards">${cards}</div>
    <p class="data-note ${noteClass}">${noteText}</p>`;
}

/* ── MAIN ────────────────────────────────────────────────── */
async function init() {
  const key = getTodayKey();
  document.getElementById('date-badge').textContent = formatDateNice(key);
  const stores = VISITAS[key] || [];

  try {
    const resp = await fetch(XLSX_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buf  = await resp.arrayBuffer();
    const wb   = XLSX.read(buf, { type: 'array', cellDates: false });
    console.log('Pestañas encontradas:', wb.SheetNames);
    const kpiMap = parseSheets(wb);
    console.log('Stores para hoy:', stores);
    console.log('KPI map (todas las entradas):', kpiMap);
    renderCards(stores, kpiMap, true);
  } catch (err) {
    console.error('Error cargando xlsx:', err);
    renderCards(stores, {}, false);
  }
}

init();
</script>
</body>
</html>
